<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MuuPrachuap · Language</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="lang">

    <header class="view-head">
      <h2 data-i18n="languageTitle">ภาษา</h2>
      <a class="icon-btn" href="user.html" aria-label="User">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>
      </a>
    </header>

    <main class="scroll">
      <div class="lang-list" id="languageList"></div>
    </main>

    <nav class="tabs">
      <a class="tab" href="index.html">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3 3 10.8V21h6v-6h6v6h6V10.8L12 3Z"/></svg>
        <span data-i18n="home">หน้าแรก</span>
      </a>
      <a class="tab" href="places.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 21s7-4.7 7-11a7 7 0 1 0-14 0c0 6.3 7 11 7 11Z"/><circle cx="12" cy="10" r="2.5"/></svg>
        <span data-i18n="placesTab">สถานที่</span>
      </a>
      <a class="tab center-tab" href="sets.html" aria-label="Offering sets">
        <span class="round">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M12 21c-4.8-2.7-7.2-6.3-7.2-10.9 3.5.5 5.9 2.4 7.2 5.7 1.3-3.3 3.7-5.2 7.2-5.7 0 4.6-2.4 8.2-7.2 10.9Z"/></svg>
        </span>
      </a>
      <a class="tab" href="cart.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 6h15l-1.6 8.2H8.2L6 3H3"/><circle cx="9" cy="20" r="1.5"/><circle cx="18" cy="20" r="1.5"/></svg>

      </a>
      <a class="tab active" href="user.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>
        <span data-i18n="userTitle">ผู้ใช้</span>
      </a>
    </nav>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>

</html>
